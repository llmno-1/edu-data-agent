# ========== 教育指标定义 ==========

metrics:
  - name: 收入总额
    description: 统计所有已支付（payment_status='paid'）的支付金额总和，反映机构整体营收。
    relevant_columns:
      - payment_record.amount
    alias: [ 收入, 营收, 销售总额, 总收入, 营收总额 ]

  - name: 报名人数
    description: 统计报名人次（student_cohort_rel 记录数），可按学员去重。
    relevant_columns:
      - student_cohort_rel.student_id
    alias: [ 报名数, 注册人数, 招生人数, 报名人次, 付费人数 ]

  - name: 退款总额
    description: 统计已批准的退款总金额（refund_status='approved'或'refunded'）。
    relevant_columns:
      - refund_request.approved_amount
    alias: [ 退款, 退费金额, 退款额, 退费总额 ]

  - name: 退款率
    description: 退款总额 / 收入总额，衡量整体退款占比。
    relevant_columns:
      - refund_request.approved_amount
      - payment_record.amount
    alias: [ 退费率, 退款占比, 退款比例 ]

  - name: 出勤率
    description: 考勤状态为 present 的课次数 / 总课次数，衡量学员到课情况。
    relevant_columns:
      - session_attendance.attendance_status
    alias: [ 到课率, 考勤率, 出勤比率 ]

  - name: 完课率
    description: 报名状态为 completed 的学员数 / 总报名学员数，衡量课程完成情况。
    relevant_columns:
      - student_cohort_rel.enroll_status
    alias: [ 课程完成率, 结课率, 完成率 ]

  - name: 客单价
    description: 收入总额 / 已支付订单数，衡量每个订单的均价水平。
    relevant_columns:
      - payment_record.amount
      - order.id
    alias: [ 平均订单金额, 平均客单价, ARPU, 笔单价 ]

  - name: 续费率
    description: 报名次数 >= 2 的学员数 / 总报名学员数，衡量学员重复报名情况。
    relevant_columns:
      - student_cohort_rel.student_id
    alias: [ 复购率, 重复报名率, 续报率 ]
