# ============================================================
# 教育问数系统 — 元数据知识库配置
# 覆盖：招生渠道、课程分类、学员档案、课程/班次/课次、
#       订单/支付/退款、报名、考勤 共 19 张核心表
# ============================================================

tables:
  # ========== 维度表 ==========

  - name: dim_channel
    role: dim
    description: 机构招生渠道维表，描述招生渠道的类别与来源信息。
    columns:
      - name: id
        role: primary_key
        description: 渠道唯一标识。
        alias: [ 渠道ID ]
        sync: false

      - name: channel_category_code
        role: dimension
        description: 渠道大类编码，如 online、offline。
        alias: [ 渠道类别编码 ]
        sync: false

      - name: channel_category_name
        role: dimension
        description: 渠道大类名称，如线上渠道、线下渠道。
        alias: [ 渠道类别, 渠道分类 ]
        sync: true

      - name: channel_code
        role: dimension
        description: 渠道编码，用于精准匹配。
        alias: [ 渠道编码 ]
        sync: false

      - name: channel_name
        role: dimension
        description: 渠道名称，如百度SEM、微信广告、地推。
        alias: [ 渠道, 来源渠道, 招生渠道 ]
        sync: true

      - name: created_at
        role: dimension
        description: 渠道记录创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: dim_course_category
    role: dim
    description: 课程分类维表，描述课程的多级分类体系。
    columns:
      - name: id
        role: primary_key
        description: 分类唯一标识。
        alias: [ 分类ID ]
        sync: false

      - name: parent_id
        role: foreign_key
        description: 上级分类ID，自引用外键。
        alias: [ 上级分类ID ]
        sync: false

      - name: category_code
        role: dimension
        description: 分类编码。
        alias: [ 分类编码 ]
        sync: false

      - name: category_name
        role: dimension
        description: 分类名称，如编程开发、数据分析、UI设计。
        alias: [ 课程分类, 类目, 品类 ]
        sync: true

      - name: category_level
        role: dimension
        description: 分类层级，1=一级分类，2=二级分类。
        alias: [ 分类级别, 层级 ]
        sync: false

      - name: created_at
        role: dimension
        description: 分类记录创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: dim_learner_identity
    role: dim
    description: 学习者身份维表，描述学员的社会身份类型。
    columns:
      - name: id
        role: primary_key
        description: 身份唯一标识。
        alias: [ 身份ID ]
        sync: false

      - name: identity_code
        role: dimension
        description: 身份编码。
        alias: [ 身份编码 ]
        sync: false

      - name: identity_name
        role: dimension
        description: 身份名称，如在职人员、在校大学生、自由职业者。
        alias: [ 学员身份, 学习者身份, 身份类型, 学员类型 ]
        sync: true

      - name: created_at
        role: dimension
        description: 记录创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: dim_grade
    role: dim
    description: 学业层级维表，描述年级/学段信息。
    columns:
      - name: id
        role: primary_key
        description: 层级唯一标识。
        alias: [ 层级ID ]
        sync: false

      - name: parent_id
        role: foreign_key
        description: 上级层级ID，自引用外键。
        alias: [ 上级层级ID ]
        sync: false

      - name: grade_code
        role: dimension
        description: 层级编码。
        alias: [ 层级编码 ]
        sync: false

      - name: grade_name
        role: dimension
        description: 层级名称，如初中、高中、大学本科。
        alias: [ 年级, 学段, 学业层级 ]
        sync: true

      - name: grade_type
        role: dimension
        description: 层级类型，stage=学段，grade=年级。
        alias: [ 层级类型 ]
        sync: false

      - name: created_at
        role: dimension
        description: 记录创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: dim_education_level
    role: dim
    description: 学历层次维表，描述已取得或正在攻读的学历。
    columns:
      - name: id
        role: primary_key
        description: 学历唯一标识。
        alias: [ 学历ID ]
        sync: false

      - name: level_code
        role: dimension
        description: 学历编码。
        alias: [ 学历编码 ]
        sync: false

      - name: level_name
        role: dimension
        description: 学历名称，如本科、硕士、博士。
        alias: [ 学历, 学历层次, 最高学历 ]
        sync: true

      - name: created_at
        role: dimension
        description: 记录创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: dim_learning_goal
    role: dim
    description: 学习目标维表，描述学员报名的学习目的。
    columns:
      - name: id
        role: primary_key
        description: 目标唯一标识。
        alias: [ 目标ID ]
        sync: false

      - name: goal_code
        role: dimension
        description: 学习目标编码。
        alias: [ 目标编码 ]
        sync: false

      - name: goal_name
        role: dimension
        description: 学习目标名称，如就业跳槽、技能提升、兴趣爱好。
        alias: [ 学习目标, 学习目的, 报班目的 ]
        sync: true

      - name: created_at
        role: dimension
        description: 记录创建时间。
        alias: [ 创建时间 ]
        sync: false


  # ========== 组织与用户表 ==========

  - name: org_institution
    role: dim
    description: 机构主表，描述教育培训机构的注册信息。
    columns:
      - name: id
        role: primary_key
        description: 机构唯一标识。
        alias: [ 机构ID ]
        sync: false

      - name: institution_code
        role: dimension
        description: 机构编码。
        alias: [ 机构编码 ]
        sync: false

      - name: institution_name
        role: dimension
        description: 机构名称，如尚硅谷、北大青鸟。
        alias: [ 机构, 培训机构, 教育机构, 学校 ]
        sync: true

      - name: institution_type
        role: dimension
        description: 机构类型，如 training_center、school、education_brand。
        alias: [ 机构类型 ]
        sync: true

      - name: province
        role: dimension
        description: 机构所在省份。
        alias: [ 省份, 省 ]
        sync: true

      - name: city
        role: dimension
        description: 机构所在城市。
        alias: [ 城市, 市 ]
        sync: true

      - name: district
        role: dimension
        description: 机构所在区县。
        alias: [ 区, 区县 ]
        sync: false

      - name: address
        role: dimension
        description: 机构详细地址。
        alias: [ 地址 ]
        sync: false

      - name: created_at
        role: dimension
        description: 机构注册时间。
        alias: [ 注册时间, 创建时间 ]
        sync: false


  - name: org_campus
    role: dim
    description: 校区表，描述机构下属的各个校区/教学点。
    columns:
      - name: id
        role: primary_key
        description: 校区唯一标识。
        alias: [ 校区ID ]
        sync: false

      - name: institution_id
        role: foreign_key
        description: 所属机构ID，关联 org_institution。
        alias: [ 机构ID ]
        sync: false

      - name: campus_code
        role: dimension
        description: 校区编码。
        alias: [ 校区编码 ]
        sync: false

      - name: campus_name
        role: dimension
        description: 校区名称，如北京昌平校区、上海徐汇校区。
        alias: [ 校区, 分校, 教学点 ]
        sync: true

      - name: province
        role: dimension
        description: 校区所在省份。
        alias: [ 省份, 省 ]
        sync: true

      - name: city
        role: dimension
        description: 校区所在城市。
        alias: [ 城市, 市 ]
        sync: true

      - name: district
        role: dimension
        description: 校区所在区县。
        alias: [ 区, 区县 ]
        sync: false

      - name: address
        role: dimension
        description: 校区详细地址。
        alias: [ 地址 ]
        sync: false

      - name: created_at
        role: dimension
        description: 校区创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: sys_user
    role: dim
    description: 平台账号主表，记录所有注册用户的基本信息。
    columns:
      - name: id
        role: primary_key
        description: 用户唯一标识。
        alias: [ 用户ID, 账号ID ]
        sync: false

      - name: nickname
        role: dimension
        description: 用户昵称。
        alias: [ 昵称, 用户名 ]
        sync: true

      - name: real_name
        role: dimension
        description: 用户真实姓名。
        alias: [ 姓名, 真实姓名 ]
        sync: true

      - name: mobile
        role: dimension
        description: 手机号码。
        alias: [ 手机, 手机号, 电话 ]
        sync: false

      - name: email
        role: dimension
        description: 电子邮箱。
        alias: [ 邮箱, 邮件 ]
        sync: false

      - name: gender
        role: dimension
        description: 用户性别。
        alias: [ 性别 ]
        sync: true

      - name: birthday
        role: dimension
        description: 出生日期。
        alias: [ 生日, 出生日期 ]
        sync: false

      - name: last_login_at
        role: dimension
        description: 最近一次登录时间。
        alias: [ 最近登录, 最后登录时间 ]
        sync: false

      - name: created_at
        role: dimension
        description: 账号注册时间。
        alias: [ 注册时间, 创建时间 ]
        sync: false


  - name: student_profile
    role: dim
    description: 学员档案表，记录学员的详细画像信息。
    columns:
      - name: id
        role: primary_key
        description: 学员档案唯一标识。
        alias: [ 学员ID, 档案ID ]
        sync: false

      - name: user_id
        role: foreign_key
        description: 关联的平台用户ID。
        alias: [ 用户ID, 账号ID ]
        sync: false

      - name: learner_identity_id
        role: foreign_key
        description: 关联的学习者身份ID。
        alias: [ 身份ID ]
        sync: false

      - name: learning_goal_id
        role: foreign_key
        description: 关联的学习目标ID。
        alias: [ 目标ID ]
        sync: false

      - name: education_level_id
        role: foreign_key
        description: 关联的学历层次ID。
        alias: [ 学历ID ]
        sync: false

      - name: grade_id
        role: foreign_key
        description: 关联的学业层级ID。
        alias: [ 层级ID ]
        sync: false

      - name: school_name
        role: dimension
        description: 就读/毕业学校名称。
        alias: [ 学校名称, 毕业院校 ]
        sync: true

      - name: entrance_year
        role: dimension
        description: 入学年份。
        alias: [ 入学年份 ]
        sync: false

      - name: industry_name
        role: dimension
        description: 所在行业。
        alias: [ 行业, 从事行业 ]
        sync: true

      - name: job_role_name
        role: dimension
        description: 职位/岗位名称。
        alias: [ 职位, 岗位 ]
        sync: true

      - name: career_stage
        role: dimension
        description: 职业阶段，如应届生、初级、资深。
        alias: [ 职业阶段, 工作年限阶段 ]
        sync: false

      - name: years_of_experience
        role: dimension
        description: 工作年限。
        alias: [ 工作年限, 工龄 ]
        sync: false

      - name: created_at
        role: dimension
        description: 档案创建时间。
        alias: [ 创建时间 ]
        sync: false


  # ========== 课程产品表 ==========

  - name: series
    role: dim
    description: 课程系列主表，描述机构发布的课程产品信息。
    columns:
      - name: id
        role: primary_key
        description: 课程系列唯一标识。
        alias: [ 课程系列ID, 系列ID ]
        sync: false

      - name: institution_id
        role: foreign_key
        description: 所属机构ID。
        alias: [ 机构ID ]
        sync: false

      - name: delivery_mode
        role: dimension
        description: 授课模式，online_live=线上直播、online_recorded=线上录播、offline_face_to_face=线下面授。
        alias: [ 授课模式, 教学模式, 上课方式 ]
        sync: true

      - name: series_code
        role: dimension
        description: 课程系列编码。
        alias: [ 系列编码 ]
        sync: false

      - name: series_name
        role: dimension
        description: 课程系列名称，如Java企业级开发实战、Python数据分析。
        alias: [ 课程系列, 课程名称, 系列名称 ]
        sync: true

      - name: sale_status
        role: dimension
        description: 售卖状态，draft=草稿、on_sale=在售、off_sale=停售。
        alias: [ 售卖状态, 销售状态 ]
        sync: true

      - name: created_by
        role: foreign_key
        description: 创建人用户ID。
        alias: [ 创建人ID ]
        sync: false

      - name: created_at
        role: dimension
        description: 课程系列创建时间。
        alias: [ 创建时间, 上线时间 ]
        sync: false


  - name: series_cohort
    role: dim
    description: 班次主表，描述课程系列下的具体开班信息。
    columns:
      - name: id
        role: primary_key
        description: 班次唯一标识。
        alias: [ 班次ID ]
        sync: false

      - name: institution_id
        role: foreign_key
        description: 所属机构ID。
        alias: [ 机构ID ]
        sync: false

      - name: series_id
        role: foreign_key
        description: 所属课程系列ID。
        alias: [ 课程系列ID ]
        sync: false

      - name: campus_id
        role: foreign_key
        description: 上课校区ID，关联 org_campus。
        alias: [ 校区ID ]
        sync: false

      - name: head_teacher_id
        role: foreign_key
        description: 班主任ID，关联 staff_profile。
        alias: [ 班主任ID ]
        sync: false

      - name: cohort_code
        role: dimension
        description: 班次编码。
        alias: [ 班次编码 ]
        sync: false

      - name: cohort_name
        role: dimension
        description: 班次名称，如Java2025春季1班。
        alias: [ 班次, 班级, 班级名称 ]
        sync: true

      - name: sale_price
        role: measure
        description: 班次售价（元）。
        alias: [ 售价, 价格, 学费, 单价 ]
        sync: false

      - name: max_student_count
        role: measure
        description: 最大招生人数。
        alias: [ 招生上限, 满班人数 ]
        sync: false

      - name: current_student_count
        role: measure
        description: 当前在班学员数。
        alias: [ 在读人数, 在班人数 ]
        sync: false

      - name: start_date
        role: dimension
        description: 开班日期。
        alias: [ 开班日期, 开课日期 ]
        sync: false

      - name: end_date
        role: dimension
        description: 结班日期。
        alias: [ 结班日期, 结课日期 ]
        sync: false

      - name: created_at
        role: dimension
        description: 班次创建时间。
        alias: [ 创建时间 ]
        sync: false


  - name: series_cohort_session
    role: dim
    description: 课次主表，描述班次下的每次课程安排与教学状态。
    columns:
      - name: id
        role: primary_key
        description: 课次唯一标识。
        alias: [ 课次ID ]
        sync: false

      - name: series_cohort_course_id
        role: foreign_key
        description: 关联的班次课程模块ID。
        alias: [ 课程模块ID ]
        sync: false

      - name: room_id
        role: foreign_key
        description: 上课教室ID。
        alias: [ 教室ID ]
        sync: false

      - name: session_no
        role: dimension
        description: 课次序号，如第1次、第2次。
        alias: [ 课次序号, 第几次课 ]
        sync: false

      - name: session_title
        role: dimension
        description: 课次标题，如第1讲 Java入门与环境搭建。
        alias: [ 课次标题, 课时名称, 课程标题 ]
        sync: true

      - name: teaching_status
        role: dimension
        description: 教学状态，scheduled=已排课、in_progress=进行中、completed=已完成、cancelled=已取消。
        alias: [ 教学状态, 上课状态, 课程状态 ]
        sync: true

      - name: checkin_required
        role: dimension
        description: 是否需要考勤签到，0=否，1=是。
        alias: [ 考勤要求, 签到要求 ]
        sync: false

      - name: teaching_date
        role: dimension
        description: 上课日期。
        alias: [ 上课日期, 授课日期 ]
        sync: false

      - name: start_time
        role: dimension
        description: 上课开始时间。
        alias: [ 开始时间, 上课时间 ]
        sync: false

      - name: end_time
        role: dimension
        description: 上课结束时间。
        alias: [ 结束时间, 下课时间 ]
        sync: false

      - name: created_at
        role: dimension
        description: 课次创建时间。
        alias: [ 创建时间 ]
        sync: false


  # ========== 交易事实表 ==========

  - name: order
    role: fact
    description: 订单主表，记录每笔报名的订单信息与支付汇总。
    columns:
      - name: id
        role: primary_key
        description: 订单唯一标识。
        alias: [ 订单ID ]
        sync: false

      - name: institution_id
        role: foreign_key
        description: 所属机构ID。
        alias: [ 机构ID ]
        sync: false

      - name: order_no
        role: dimension
        description: 订单编号。
        alias: [ 订单号, 订单编号 ]
        sync: false

      - name: user_id
        role: foreign_key
        description: 下单用户ID。
        alias: [ 用户ID ]
        sync: false

      - name: student_id
        role: foreign_key
        description: 报名学员档案ID。
        alias: [ 学员ID ]
        sync: false

      - name: coupon_receive_record_id
        role: foreign_key
        description: 使用的领券记录ID。
        alias: [ 优惠券记录ID ]
        sync: false

      - name: order_source_channel_id
        role: foreign_key
        description: 订单来源渠道ID。
        alias: [ 来源渠道ID ]
        sync: false

      - name: order_status
        role: dimension
        description: 订单状态，pending=待支付、paid=已支付、completed=已完成、cancelled=已取消、partial_refunded=部分退款、refunded=全额退款。
        alias: [ 订单状态, 状态 ]
        sync: true

      - name: total_amount
        role: measure
        description: 订单原价总额（元）。
        alias: [ 订单总额, 原价, 总金额 ]
        sync: false

      - name: discount_amount
        role: measure
        description: 优惠折扣金额（元）。
        alias: [ 折扣金额, 优惠金额 ]
        sync: false

      - name: payable_amount
        role: measure
        description: 应付金额（元），原价扣减折扣后。
        alias: [ 应付金额, 实付金额, 应付 ]
        sync: false

      - name: paid_amount
        role: measure
        description: 已支付金额（元）。
        alias: [ 已付金额, 支付金额 ]
        sync: false

      - name: refund_amount
        role: measure
        description: 已退款金额（元）。
        alias: [ 退款金额, 已退金额 ]
        sync: false

      - name: paid_at
        role: dimension
        description: 支付完成时间。
        alias: [ 支付时间, 付款时间 ]
        sync: false

      - name: cancel_at
        role: dimension
        description: 订单取消时间。
        alias: [ 取消时间 ]
        sync: false

      - name: created_at
        role: dimension
        description: 订单创建时间。
        alias: [ 下单时间, 创建时间 ]
        sync: false


  - name: order_item
    role: fact
    description: 订单明细表，记录订单中各报名班次的明细信息。
    columns:
      - name: id
        role: primary_key
        description: 订单明细唯一标识。
        alias: [ 明细ID ]
        sync: false

      - name: institution_id
        role: foreign_key
        description: 所属机构ID。
        alias: [ 机构ID ]
        sync: false

      - name: order_id
        role: foreign_key
        description: 所属订单ID。
        alias: [ 订单ID ]
        sync: false

      - name: user_id
        role: foreign_key
        description: 下单用户ID。
        alias: [ 用户ID ]
        sync: false

      - name: student_id
        role: foreign_key
        description: 报名学员档案ID。
        alias: [ 学员ID ]
        sync: false

      - name: cohort_id
        role: foreign_key
